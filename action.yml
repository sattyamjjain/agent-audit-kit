name: 'AgentAuditKit MCP Security Scan'
description: 'Security scanner for MCP-connected AI agent pipelines. Detects misconfigurations, secret exposure, tool poisoning, rug pulls, and trust boundary violations.'
author: 'sattyamjjain'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Project directory to scan'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report (critical, high, medium, low, info)'
    required: false
    default: 'low'
  fail-on:
    description: 'Fail the action if findings at or above this severity (critical, high, medium, low, none)'
    required: false
    default: 'high'
  format:
    description: 'Output format (console, json, sarif)'
    required: false
    default: 'sarif'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning'
    required: false
    default: 'true'
  include-user-config:
    description: 'Also scan user-level agent configs (~/.claude/)'
    required: false
    default: 'false'
  rules:
    description: 'Comma-separated rule IDs to run (default: all)'
    required: false
    default: ''
  exclude-rules:
    description: 'Comma-separated rule IDs to skip'
    required: false
    default: ''
  ignore-paths:
    description: 'Comma-separated paths to skip during scan'
    required: false
    default: ''
  config:
    description: 'Path to .agent-audit-kit.yml configuration file'
    required: false
    default: ''

outputs:
  findings-count:
    description: 'Total number of findings'
  critical-count:
    description: 'Number of critical findings'
  high-count:
    description: 'Number of high severity findings'
  sarif-file:
    description: 'Path to the SARIF output file'
  exit-code:
    description: 'Exit code from the scan (0=pass, 1=findings exceed threshold, 2=error)'

runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.path }}
    - ${{ inputs.severity }}
    - ${{ inputs.fail-on }}
    - ${{ inputs.format }}
    - ${{ inputs.upload-sarif }}
    - ${{ inputs.include-user-config }}
    - ${{ inputs.rules }}
    - ${{ inputs.exclude-rules }}
    - ${{ inputs.ignore-paths }}
    - ${{ inputs.config }}
