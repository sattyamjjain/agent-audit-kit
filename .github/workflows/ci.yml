name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linting
        run: |
          pip install ruff
          ruff check agent_audit_kit/ tests/

      - name: Run tests
        run: pytest -v --tb=short

      - name: Run self-scan
        run: agent-audit-kit scan . --format json --score

      - name: Run self-scan SARIF
        run: agent-audit-kit scan . --format sarif -o self-scan.sarif

      - name: Verify OWASP report
        run: agent-audit-kit scan . --owasp-report

      - name: Verify discovery
        run: agent-audit-kit discover

      - name: Verify score
        run: agent-audit-kit score .
