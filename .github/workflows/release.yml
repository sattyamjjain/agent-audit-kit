name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # --------------------------------------------------------------------------
  # 1. Publish to PyPI using trusted publishing (OIDC)
  # --------------------------------------------------------------------------
  pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agent-audit-kit
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # --------------------------------------------------------------------------
  # 2. Build and push Docker image to GHCR
  # --------------------------------------------------------------------------
  docker:
    name: Push Docker image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/sattyamjjain/agent-audit-kit:${{ steps.version.outputs.version }}
            ghcr.io/sattyamjjain/agent-audit-kit:latest
          labels: |
            org.opencontainers.image.title=AgentAuditKit
            org.opencontainers.image.description=Security scanner for MCP-connected AI agent pipelines
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/sattyamjjain/agent-audit-kit
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # 3. Create GitHub Release with auto-generated notes
  # --------------------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [pypi, docker]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Installation

            **pip:**
            ```bash
            pip install agent-audit-kit==${{ github.ref_name }}
            ```

            **Docker:**
            ```bash
            docker pull ghcr.io/sattyamjjain/agent-audit-kit:${{ github.ref_name }}
            ```

            **GitHub Action:**
            ```yaml
            - uses: sattyamjjain/agent-audit-kit@${{ github.ref_name }}
              with:
                fail-on: high
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
