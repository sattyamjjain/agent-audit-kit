name: coverage-page

on:
  push:
    branches: [main]
    paths:
      - 'agent_audit_kit/data/ox-cve-manifest.json'
      - 'agent_audit_kit/data/prisma-airs-*.json'
      - 'scripts/build_coverage_page.py'
      - 'agent_audit_kit/coverage.py'
      - 'agent_audit_kit/translators/prisma_airs.py'
      - '.github/workflows/coverage-page.yml'
  schedule:
    - cron: '17 4 * * *'  # nightly 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"
      - name: Install AAK
        run: pip install -e .
      - name: Build coverage page
        run: python scripts/build_coverage_page.py
      - name: Commit + push
        run: |
          if ! git diff --quiet -- site/coverage/; then
            git config user.name "aak-bot"
            git config user.email "aak-bot@users.noreply.github.com"
            git add site/coverage/
            git commit -m "chore: refresh public coverage page"
            git push
          else
            echo "no coverage-page change"
          fi
